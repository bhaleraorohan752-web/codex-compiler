<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeX Online Compiler</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="index.css">
    <style>
        /* Ensuring editor height is consistent */
        #editor { height: 60vh; border: 1px solid #333; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 60px; background: var(--card-bg); border-bottom: 1px solid var(--border-color);">
    <div style="font-weight: bold; color: var(--accent-hover); font-size: 1.6rem; cursor: pointer;" onclick="window.location.href='index.html'">CodeX</div>
    <div style="display: flex; gap: 30px; align-items: center;">
        <a href="index.html" style="color: white; text-decoration: none;">Home</a>
        <a href="editor.html" style="color: white; text-decoration: none;">Editor</a>
        <a href="dashboard.html" style="color: white; text-decoration: none;">My Snippets</a>
        <div id="nav-auth">
            <a href="login.html" style="background: var(--accent-color); padding: 8px 18px; border-radius: 6px; color: white; text-decoration: none; font-weight: bold;">Login</a>
        </div>
    </div>
</nav>

<div id="compiler-container">
    <div id="header-controls">
        <div>
            <button onclick="saveCode()">💾 Save Code</button>
            <button onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})">📂 My Gallery</button>
        </div>
        <h2 style="margin:0; color:var(--accent-hover)">CodeX</h2>
        <div style="display:flex; gap:10px; align-items:center;">
            <select id="language" style="padding:7px; border-radius:5px; background:#0d1117; color:white;">
                <option value="c">C</option>
                <option value="cpp">C++</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
            </select>
            <button id="run-btn">▶ Run Code</button>
        </div>
    </div>

    <div id="editor"></div>

    <div id="terminal-section">
        <div class="terminal-header">
            <span>TERMINAL</span>
            <div style="display:flex; gap:15px; align-items:center;">
                <button id="ai-btn" class="hidden" onclick="getAIExplanation()" style="background:#722ed1; border:none; padding:2px 8px; font-size:10px;">🤖 AI Explain</button>
                <span style="color:#238636">● Active Session</span>
            </div>
        </div>
        <div id="output">Output will stream here...</div>
        <input type="text" id="terminal-input" placeholder="Enter input for your program here and press Enter...">
    </div>
</div>

<div id="gallery-container" style="padding: 50px 20px;">
    <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom: 30px;">
        <h2 style="margin:0;">📂 Saved Snippets</h2>
        <button onclick="fetchSnippets()">🔄 Refresh List</button>
    </div>
    <div id="snippets-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
<script>
    const API_URL = "https://codex-compiler-vxcz.onrender.com";
    const socket = io(API_URL);
    const outputDiv = document.getElementById('output');
    const terminalInput = document.getElementById('terminal-input');
    const aiBtn = document.getElementById('ai-btn');

    // 1. Monaco Editor Initialization
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: `#include <stdio.h>\n\nint main() {\n    printf("Hello, World!\\n");\n    return 0;\n}`,
            language: 'c',
            theme: 'vs-dark',
            automaticLayout: true
        });

        // Check for code passed from Dashboard
        const savedCode = localStorage.getItem('tempCode');
        const savedLang = localStorage.getItem('tempLang');
        if (savedCode && savedLang) {
            window.editor.setValue(decodeURIComponent(savedCode));
            document.getElementById('language').value = savedLang;
            monaco.editor.setModelLanguage(window.editor.getModel(), savedLang);
            localStorage.removeItem('tempCode');
            localStorage.removeItem('tempLang');
        }

        document.getElementById('language').addEventListener('change', function () {
            monaco.editor.setModelLanguage(window.editor.getModel(), this.value);
        });

        document.getElementById('run-btn').onclick = function() {
            outputDiv.innerText = "Connecting to secure container...\n";
            aiBtn.classList.add('hidden');
            socket.emit('runCode', {
                code: window.editor.getValue(),
                language: document.getElementById('language').value
            });
        };
    });

    // 2. Navigation Bar Update
    function updateNav() {
        const username = localStorage.getItem('username');
        if (username) {
            document.getElementById('nav-auth').innerHTML = `
                <span style="color: grey; margin-right: 10px;">Hi, ${username}</span>
                <button onclick="logout()" style="background: #f85149; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Logout</button>
            `;
        }
    }
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    // 3. Socket Event Handling
    socket.on('output', (data) => {
        outputDiv.innerText += data;
        if (data.toLowerCase().includes('error')) aiBtn.classList.remove('hidden');
        outputDiv.scrollTop = outputDiv.scrollHeight;
    });

    terminalInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            socket.emit('sendInput', terminalInput.value);
            outputDiv.innerText += terminalInput.value + "\n";
            terminalInput.value = "";
        }
    });

    // 4. Secure Database Functions
    async function saveCode() {
        const token = localStorage.getItem('token'); 
        if (!token) {
            alert("Please login to save programs.");
            window.location.href = 'login.html';
            return;
        }

        const title = prompt("Enter snippet title:");
        if (!title) return;

        try {
            // FIX: Changed endpoint to /save and removed extra backticks
            const res = await fetch(`${API_URL}/save`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': token 
                },
                body: JSON.stringify({ 
                    title, 
                    code: window.editor.getValue(), 
                    language: document.getElementById('language').value 
                })
            });

            const data = await res.json();
            if (res.ok) {
                alert("Code saved successfully!");
                fetchSnippets();
            } else {
                alert("Error: " + data.error);
                if(data.error === "Session Expired") window.location.href = 'login.html';
            }
        } catch (err) {
            alert("Server unreachable. Check if Render service is live.");
        }
    }

    async function fetchSnippets() {
        const token = localStorage.getItem('token'); 
        const grid = document.getElementById('snippets-grid');
        if (!grid || !token) return;

        try {
            const res = await fetch(`${API_URL}/snippets`, {
                method: 'GET',
                headers: { 'Authorization': token } 
            });

            if (!res.ok) throw new Error("Failed to fetch");
            const data = await res.json();
            
            grid.innerHTML = data.map(s => `
                <div class="snippet-card" style="background:#161b22; border:1px solid #30363d; padding:15px; border-radius:10px;">
                    <div style="display:flex; justify-content:space-between; color:grey; font-size:11px;">
                        <span>${s.language.toUpperCase()}</span>
                        <span>${new Date(s.createdAt).toLocaleDateString()}</span>
                    </div>
                    <h3 style="color:#58a6ff; margin:10px 0;">${s.title}</h3>
                    <pre style="background:#000; padding:10px; border-radius:5px; height:70px; overflow:hidden; font-size:11px;"><code>${s.code}</code></pre>
                    <div style="margin-top:15px; display:flex; gap:10px;">
                        <button onclick="loadSnippet(\`${encodeURIComponent(s.code)}\`, '${s.language}')" style="flex:1; background:#238636; border:none; color:white; padding:8px; border-radius:5px; cursor:pointer;">Open</button>
                        <button onclick="deleteSnippet('${s._id}')" style="color:#f85149; border:1px solid #f85149; background:transparent; padding:8px; border-radius:5px; cursor:pointer;">Delete</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
        }
    }

    function loadSnippet(code, lang) {
        window.editor.setValue(decodeURIComponent(code));
        document.getElementById('language').value = lang;
        monaco.editor.setModelLanguage(window.editor.getModel(), lang);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteSnippet(id) {
        const token = localStorage.getItem('token');
        if(confirm("Delete permanently?")) {
            await fetch(`${API_URL}/snippets/${id}`, { 
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
            fetchSnippets();
        }
    }

    window.onload = function() {
        updateNav();
        fetchSnippets();
    };
</script>
</body>
</html>
